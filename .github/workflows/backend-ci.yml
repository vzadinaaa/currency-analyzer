name: Backend program CI

on:

  push:

    branches:
      - main
      - develop
      - feature/**

  pull_request:

    branches:
      - main
      - develop
      
permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:

  build:

    runs-on: ubuntu-latest

    defaults:

      run:

        working-directory: backend

    steps:

      - name: Checkout repository

        uses: actions/checkout@v4

      - name: Set up Java 21

        uses: actions/setup-java@v4

        with:

          java-version: '21'

          distribution: 'temurin'

      - name: Build project

        run: mvn clean install

      - name: Run tests

        run: mvn test

      - name: Generate JaCoCo report

        run: mvn jacoco:report

      - name: Extract branch coverage
        id: coverage
        run: |
          BRANCH_MISSED=$(grep -oP '<counter type="BRANCH" missed="\K[0-9]+' target/site/jacoco/jacoco.xml | head -1)
          BRANCH_COVERED=$(grep -oP '<counter type="BRANCH" missed="[0-9]+" covered="\K[0-9]+' target/site/jacoco/jacoco.xml | head -1)

          TOTAL=$((BRANCH_MISSED + BRANCH_COVERED))
          COVERAGE=$(awk "BEGIN { printf \"%.2f\", ($BRANCH_COVERED / $TOTAL) * 100 }")

          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT

      - name: Comment PR with branch coverage
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const coverage = "${{ steps.coverage.outputs.coverage }}";

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## JaCoCo Branch Coverage

              Branch coverage: **${coverage}%**`
            })
