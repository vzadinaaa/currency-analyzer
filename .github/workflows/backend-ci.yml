name: Backend program CI

on:

  push:

    branches:
      - main
      - develop
      - feature/**

  pull_request:

    branches:
      - main
      - develop

jobs:

  build:

    runs-on: ubuntu-latest

    defaults:

      run:

        working-directory: backend

    steps:

      - name: Checkout repository

        uses: actions/checkout@v4

      - name: Set up Java 21

        uses: actions/setup-java@v4

        with:

          java-version: '21'

          distribution: 'temurin'

      - name: Build project

        run: mvn clean install

      - name: Run tests

        run: mvn test

      - name: Generate JaCoCo report

        run: mvn jacoco:report

      - name: Extract branch coverage
        id: coverage
        run: |
          FILE=target/site/jacoco/jacoco.xml

          extract_percentage () {
            TYPE=$1
      
            MISSED=$(grep -oP "<counter type=\"$TYPE\" missed=\"\K[0-9]+" $FILE | head -1)
            COVERED=$(grep -oP "<counter type=\"$TYPE\" missed=\"[0-9]+\" covered=\"\K[0-9]+" $FILE | head -1)
      
            TOTAL=$((MISSED + COVERED))
      
            if [ "$TOTAL" -eq 0 ]; then
              echo "0"
            else
              awk "BEGIN { printf \"%.2f\", ($COVERED / $TOTAL) * 100 }"
            fi
          }
      
          BRANCH=$(extract_percentage BRANCH)
          LINE=$(extract_percentage LINE)
          INSTRUCTION=$(extract_percentage INSTRUCTION)
      
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "line=$LINE" >> $GITHUB_OUTPUT
          echo "instruction=$INSTRUCTION" >> $GITHUB_OUTPUT

      - name: Comment PR with coverage
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const branch = "${{ steps.coverage.outputs.branch }}";
            const line = "${{ steps.coverage.outputs.line }}";
            const instruction = "${{ steps.coverage.outputs.instruction }}";
      
            const body = `
            ## 📊 JaCoCo Coverage Report
      
            | Metric | Coverage |
            |---|---|
            | 🌿 Branch Coverage | **${branch}%** |
            | 📄 Line Coverage | **${line}%** |
            | ⚙️ Instruction Coverage | **${instruction}%** |
      
            ---
            Generated automatically by GitHub Actions.
            `;
      
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
