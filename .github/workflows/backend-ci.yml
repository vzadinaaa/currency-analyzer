name: Backend program CI

on:

  push:

    branches:
      - main
      - develop
      - feature/**

  pull_request:

    branches:
      - main
      - develop

jobs:

  build:

    runs-on: ubuntu-latest

    defaults:

      run:

        working-directory: backend

    steps:

      - name: Checkout repository

        uses: actions/checkout@v4

      - name: Set up Java 21

        uses: actions/setup-java@v4

        with:

          java-version: '21'

          distribution: 'temurin'

      - name: Build project

        run: mvn clean install

      - name: Run tests

        run: mvn test

      - name: Generate JaCoCo report

        run: mvn jacoco:report

      - name: Extract coverage percentage
        id: coverage
        run: |
          pip install lxml --quiet
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET
          tree = ET.parse("target/site/jacoco/jacoco.xml")
          root = tree.getroot()

          def get_pct(type):
              for c in root.findall("counter"):
                  if c.get("type") == type:
                      covered = int(c.get("covered"))
                      missed = int(c.get("missed"))
                      total = covered + missed
                      return covered / total * 100 if total else 0
              return 0

          line = get_pct("LINE")
          branch = get_pct("BRANCH")

          print(f"LINE={line}")
          print(f"BRANCH={branch}")

          with open("coverage.txt", "w") as f:
              f.write(f"{line:.1f}% (lines), {branch:.1f}% (branches)")
          EOF

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('coverage.txt', 'utf8');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### 📊 Coverage\n**${summary}**`
            });

      - name: Upload JaCoCo HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 14
